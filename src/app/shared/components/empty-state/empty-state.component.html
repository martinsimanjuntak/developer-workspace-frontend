<div class="empty-state">
  <h4>{{ title() }}</h4>
  <p>{{ message() }}</p>

  @if (actionLabel() && actionLink()) {
    <a class="empty-state__action" [routerLink]="actionLink()!">{{ actionLabel() }}</a>
  } @else if (actionLabel()) {
    <button class="empty-state__action" type="button" (click)="actionTriggered.emit()">
      {{ actionLabel() }}
    </button>
  }
</div>
