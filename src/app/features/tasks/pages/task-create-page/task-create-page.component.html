<section class="task-form-page">
  <header class="page-header">
    <div>
      <p class="page-header__eyebrow">Task Module</p>
      <h3 class="page-header__title">Create Task</h3>
      <p class="page-header__subtitle">Add a new task to the workspace.</p>
    </div>
    <a class="secondary-button" routerLink="/tasks">Back to Tasks</a>
  </header>

  @if (errorMessage(); as message) {
    <div class="alert alert--error">{{ message }}</div>
  }

  <div class="form-card">
    <app-task-form [isSubmitting]="isSubmitting()" (submitted)="handleSubmit($event)" />
  </div>
</section>
