@if (isLoading()) {
  <app-loading-state title="Loading task" message="Fetching task data for editing." />
} @else {
  <section class="task-form-page">
    <header class="page-header">
      <div>
        <p class="page-header__eyebrow">Task Module</p>
        <h3 class="page-header__title">Edit Task</h3>
        <p class="page-header__subtitle">Update the selected task.</p>
      </div>
      <a class="secondary-button" [routerLink]="task() ? ['/tasks', task()!.id] : ['/tasks']">Back</a>
    </header>

    @if (errorMessage(); as message) {
      <div class="alert alert--error">{{ message }}</div>
    }

    @if (task(); as currentTask) {
      <div class="form-card">
        <app-task-form
          [mode]="'edit'"
          [initialValue]="currentTask"
          [isSubmitting]="isSubmitting()"
          (submitted)="handleSubmit($event)"
        />
      </div>
    }
  </section>
}
